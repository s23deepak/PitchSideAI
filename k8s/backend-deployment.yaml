apiVersion: apps/v1
kind: Deployment
metadata:
  name: pitchside-backend
  labels:
    app: pitchside-ai
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pitchside-ai
      component: backend
  template:
    metadata:
      labels:
        app: pitchside-ai
        component: backend
    spec:
      serviceAccountName: pitchside
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      containers:
      - name: backend
        image: pitchside-ai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        - name: MAX_CONCURRENT_TASKS
          value: "20"
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: pitchside-config
              key: aws_region
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: pitchside-aws-creds
              key: access_key_id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: pitchside-aws-creds
              key: secret_access_key
        - name: OPENSEARCH_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: pitchside-config
              key: opensearch_endpoint
        - name: DYNAMODB_TABLE_NAME
          valueFrom:
            configMapKeyRef:
              name: pitchside-config
              key: dynamodb_table

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs

      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: pitchside-backend
  labels:
    app: pitchside-ai
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: pitchside-ai
    component: backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pitchside-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pitchside-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
